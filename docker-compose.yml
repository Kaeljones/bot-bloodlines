version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bloodlines_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bloodlines_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pRootPassword"]
      timeout: 10s
      retries: 5

  app:
    build: .
    container_name: bloodlines_bot
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DEVELOPMENT_GUILD_ID: ${DEVELOPMENT_GUILD_ID}
      DATABASE_URL: mysql://root:rootpassword@db:3306/bloodlines_db
    ports:
      - "3000:3000"

volumes:
  mysql_data:
